version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__LOG_LEVEL: "INFO"
    restart: unless-stopped

volumes:
  qdrant_data: